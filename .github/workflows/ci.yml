name: CI

# build.yml gira solo su tag (release): niente lint né test ad ogni push/PR.
# Questo workflow chiude quel buco con la rete di sicurezza più economica per
# un workspace così articolato (10+ crate interni): clippy con warning come
# errori, e i test dell'intero workspace.
on:
  push:
    branches: [main, dev]
  pull_request:

env:
  TAURI_APP_DIR: apps/srt-gui
  WHISPER_DONT_GENERATE_BINDINGS: "1"

jobs:
  # ===========================================================
  # Setup condiviso: dipendenze di sistema Tauri/whisper.cpp +
  # dist del frontend, richiesto da `tauri::generate_context!()`
  # (il crate `vesta` non compila senza apps/srt-gui/dist).
  # ===========================================================
  clippy:
    name: Clippy (workspace, all-targets)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache GHA credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-sccache-ci-clippy"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            pkg-config \
            libssl-dev \
            libclang-dev \
            mold

      - name: Install frontend dependencies
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm ci

      - name: Generate platform icons
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npx tauri icon src-tauri/icons/icon.svg -o src-tauri/icons

      - name: Build frontend assets (richiesto da generate_context!)
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm run build

      - name: cargo clippy --workspace --all-targets
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (workspace)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache GHA credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-sccache-ci-test"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            pkg-config \
            libssl-dev \
            libclang-dev \
            mold

      - name: Install frontend dependencies
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm ci

      - name: Generate platform icons
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npx tauri icon src-tauri/icons/icon.svg -o src-tauri/icons

      - name: Build frontend assets (richiesto da generate_context!)
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm run build

      - name: cargo test --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo test --workspace
