name: Release (semantic-release)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Validate and Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python (audit i18n)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Rust stable (sync Cargo.lock)
        uses: dtolnay/rust-toolchain@stable

      - name: Normalize line endings
        shell: bash
        run: |
          sed -i 's/\r$//' build-scripts/PKGBUILD \
                           build-scripts/update_project_info.sh \
                           build-scripts/check_internal_crate_versions.sh

      - name: Validate internal crate versions
        shell: bash
        run: bash build-scripts/check_internal_crate_versions.sh

      - name: Validate i18n translations
        shell: bash
        run: |
          python3 apps/srt-gui/scripts/check_missing_translations.py \
            --output apps/srt-gui/reports/missing_translations_report.json \
            --fail-on-issues \
            --block-reasons missing_locale,missing_key,empty_value,placeholder_mismatch

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Release via semantic-release
        uses: cycjimmy/semantic-release-action@v5
        id: release
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            @cleyrop-org/semantic-release-backmerge
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
