name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TAURI_APP_DIR: apps/srt-gui
  WHISPER_DONT_GENERATE_BINDINGS: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===========================================================
  # Build Linux (.deb .rpm)
  # ===========================================================
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache GHA credentials
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-sccache-linux"

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^pkgver=//p' build-scripts/PKGBUILD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            pkg-config \
            libssl-dev \
            libclang-dev

      # Vulkan SDK (LunarG): headers, loader e glslc, richiesti da ggml-vulkan
      # per compilare gli shader della feature `vulkan` di whisper.cpp.
      # A runtime basta libvulkan1 (dichiarata nel deb/rpm): senza driver GPU
      # whisper.cpp ricade automaticamente sulla CPU.
      - name: Install Vulkan SDK
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install frontend dependencies
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm ci

      - name: Normalize line endings for bash validation
        shell: bash
        run: |
          sed -i 's/\r$//' build-scripts/check_internal_crate_versions.sh
          sed -i 's/\r$//' build-scripts/PKGBUILD
          sed -i 's/\r$//' Cargo.toml

      - name: Validate internal crate versions
        shell: bash
        run: bash build-scripts/check_internal_crate_versions.sh

      - name: Validate i18n translations (missing/empty keys)
        shell: bash
        run: |
          python3 apps/srt-gui/scripts/check_missing_translations.py \
            --output apps/srt-gui/reports/missing_translations_report.json \
            --fail-on-issues \
            --block-reasons missing_locale,missing_key,empty_value,placeholder_mismatch

      - name: Validate i18n keys referenced in source
        shell: bash
        run: node apps/srt-gui/scripts/check-i18n.mjs

      - name: Generate platform icons
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npx tauri icon src-tauri/icons/icon.svg -o src-tauri/icons

      - name: Build Tauri app
        working-directory: ${{ env.TAURI_APP_DIR }}
        shell: bash
        env:
          NO_STRIP: true
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: npx tauri build --bundles deb,rpm -- --features vulkan

      - name: Upload DEB
        uses: actions/upload-artifact@v6
        with:
          name: vesta-linux-deb
          path: target/release/bundle/deb/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v6
        with:
          name: vesta-linux-rpm
          path: target/release/bundle/rpm/*.rpm

  # ===========================================================
  # Arch Linux Package (depends on core linux build)
  # ===========================================================
  build-linux-arch:
    name: Build (linux-arch)
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^pkgver=//p' build-scripts/PKGBUILD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download DEB artifact
        uses: actions/download-artifact@v7
        with:
          name: vesta-linux-deb
          path: deb-artifact

      - name: Arch Linux Package
        run: |
          DEB_FILE=$(find deb-artifact -name "*.deb" | head -n 1)
          SHA256=$(sha256sum "$DEB_FILE" | awk '{print $1}')
          cp "$DEB_FILE" "build-scripts/vesta-${VERSION}.deb"

          # makepkg vieta colons, slash, spazi e trattini in pkgver: le pre-release
          # semantic-release (es. "0.14.0-dev.3") vanno sanificate sostituendo "-" con "."
          PKGVER="${VERSION//-/.}"

          cd build-scripts
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          LOCAL_URI="file:///workspace/build-scripts/vesta-${VERSION}.deb"
          # NB: nel PKGBUILD la source è "${_pkgname}-${pkgver}.deb::${url}/releases/...",
          # cioè usa la variabile ${url}, non un literal "https://": matchare "https://"
          # qui non intercetta mai la riga e makepkg continua a scaricare dal
          # rilascio GitHub (che a questo punto della pipeline non esiste ancora -> 404).
          sed -i "s|\${_pkgname}-\${pkgver}.deb::\${url}[^ \"]*|\${_pkgname}-\${pkgver}.deb::${LOCAL_URI}|" PKGBUILD
          sed -i "0,/[a-f0-9]\{64\}/s//${SHA256}/" PKGBUILD

          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/build-scripts archlinux:base-devel bash -c "
            pacman -Syu --noconfirm git sudo
            useradd -m builder
            chown -R builder:builder .
            echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
            su builder -c 'makepkg -sfc --noconfirm'
          "

      - name: Upload Arch Package
        uses: actions/upload-artifact@v6
        with:
          name: packages-arch
          path: build-scripts/*.pkg.tar.zst

  # ===========================================================
  # Flatpak Build (depends on core linux build)
  # ===========================================================
  build-linux-flatpak:
    name: Build (linux-flatpak)
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^pkgver=//p' build-scripts/PKGBUILD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download DEB artifact
        uses: actions/download-artifact@v7
        with:
          name: vesta-linux-deb
          path: deb-artifact

      - name: Flatpak Build
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

          DEB_FILE=$(find deb-artifact -name "*.deb" | head -n 1)
          mkdir -p extracted-deb
          dpkg-deb -x "$DEB_FILE" extracted-deb

          mkdir -p build-scripts/flatpak-files
          BINARY=$(find extracted-deb/usr/bin -name "vesta" -type f -executable | head -1)
          if [ -z "$BINARY" ]; then
            BINARY=$(find extracted-deb -name "vesta" -type f -executable | head -1)
          fi
          cp "$BINARY" build-scripts/flatpak-files/vesta

          # icon.png è il master 512x512 generato da `tauri icon` (icon.svg)
          cp apps/srt-gui/src-tauri/icons/icon.png build-scripts/flatpak-files/com.vesta.desktop.png
          cp build-scripts/com.vesta.desktop.desktop build-scripts/flatpak-files/
          sed -i 's/^Icon=vesta/Icon=com.vesta.desktop/' build-scripts/flatpak-files/com.vesta.desktop.desktop
          sed -i 's/^StartupWMClass=vesta/StartupWMClass=com.vesta.desktop/' build-scripts/flatpak-files/com.vesta.desktop.desktop

          cd build-scripts
          flatpak-builder --force-clean --repo=repo flatpak-build com.vesta.desktop.flatpak.yml
          flatpak build-bundle repo "vesta-${VERSION}.flatpak" com.vesta.desktop

      - name: Upload Flatpak
        uses: actions/upload-artifact@v6
        with:
          name: packages-flatpak
          path: build-scripts/vesta-*.flatpak

  # ===========================================================
  # Build Windows (.exe .msi)
  # ===========================================================
  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache GHA credentials
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-sccache-windows"

      - name: Cache Tauri tools (NSIS, WiX)
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/tauri
          key: tauri-tools-windows-${{ runner.os }}-v1

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^pkgver=//p' build-scripts/PKGBUILD)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Determine Windows bundle targets
        id: bundle_targets
        shell: bash
        run: |
          # WiX/MSI richiede un identificatore di pre-release puramente numerico
          # (<= 65535): "0.14.0-dev.3" non è un formato valido per il target msi
          # e fa fallire l'intero step di build (niente exe, niente msi in release).
          # Le pre-release (tag con "-", cioè le build sul branch dev) generano
          # quindi solo l'installer NSIS; l'MSI resta riservato alle release stabili.
          if [[ "$VERSION" == *-* ]]; then
            echo "targets=nsis" >> "$GITHUB_OUTPUT"
          else
            echo "targets=nsis,msi" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Preflight Cargo check (whisper-rs-sys)
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo check -p whisper-rs-sys

      - name: Install frontend dependencies
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm ci

      - name: Normalize line endings for bash validation (windows)
        shell: bash
        run: |
          sed -i 's/\r$//' build-scripts/check_internal_crate_versions.sh
          sed -i 's/\r$//' build-scripts/PKGBUILD
          sed -i 's/\r$//' Cargo.toml

      - name: Validate internal crate versions
        shell: bash
        run: bash build-scripts/check_internal_crate_versions.sh

      - name: Generate platform icons
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npx tauri icon src-tauri/icons/icon.svg -o src-tauri/icons

      - name: Build frontend assets for Cargo preflight
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm run build

      - name: Preflight Cargo check
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo check --manifest-path apps/srt-gui/src-tauri/Cargo.toml --locked

      - name: Build Tauri app
        working-directory: ${{ env.TAURI_APP_DIR }}
        shell: pwsh
        env:
          NO_STRIP: true
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: npx tauri build --bundles ${{ steps.bundle_targets.outputs.targets }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v6
        with:
          name: packages-windows-nsis
          path: target/release/bundle/nsis/*.exe

      - name: Upload MSI installer
        if: ${{ steps.bundle_targets.outputs.targets == 'nsis,msi' }}
        uses: actions/upload-artifact@v6
        with:
          name: packages-windows-msi
          path: target/release/bundle/msi/*.msi



  # ===========================================================
  # GitHub Release
  # ===========================================================
  release:
    name: Create Release
    needs: [build-linux, build-linux-arch, build-linux-flatpak, build-windows]
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') && needs.build-linux.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.deb" -o -name "*.rpm" \
            -o -name "*.exe" -o -name "*.msi" \
            -o -name "*.pkg.tar.zst" -o -name "*.flatpak" \
          \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Prepare fallback release body
        run: |
          # Il body autorevole è creato da semantic-release (@semantic-release/github)
          # dai conventional commits. Questo file serve solo come fallback se la
          # release non esistesse ancora (es. run manuale su un tag orfano).
          echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) for details." > release-notes-for-tag.md

      - name: Create Release and Upload Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Crea la release se non esiste
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Creazione della release..."
            PRERELEASE_FLAG=""
            if [[ "${{ github.ref_name }}" == *-* ]]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "${{ github.ref_name }}" \
              --title "vesta ${{ github.ref_name }}" \
              --notes-file release-notes-for-tag.md \
              --target "${{ github.sha }}" \
              $PRERELEASE_FLAG
          else
            echo "La release esiste già."
          fi

          # Upload degli asset con tentativi di retry in caso di errori transienti (es. 503)
          for i in {1..5}; do
            echo "Tentativo di upload $i di 5..."
            if gh release upload "${{ github.ref_name }}" release/* --clobber; then
              echo "Upload completato con successo!"
              echo "Avvio automatico del workflow di pubblicazione su AUR..."
              gh workflow run "Publish to AUR" --ref main || echo "::warning::Impossibile avviare il workflow di pubblicazione su AUR"
              exit 0
            else
              echo "Errore durante l'upload, attesa di 10 secondi prima di riprovare..."
              sleep 10
            fi
          done
          echo "Impossibile caricare gli asset dopo 5 tentativi."
          exit 1
