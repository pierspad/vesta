name: whisper-bench

# Build della mini-app di benchmark Whisper (apps/whisper-bench).
# Separato dalla CI normale per non allungarla: parte automaticamente solo
# quando cambia l'app (o questo workflow), oppure a mano da
# Actions -> whisper-bench -> Run workflow.
#
# Architettura (un solo eseguibile per OS, auto-detect hardware):
#   - job `launcher`: l'unica app Tauri pubblicata, per linux e windows.
#     Include sempre CPU + Vulkan (un solo binario copre AMD/NVIDIA/Intel
#     senza toolchain pesanti). Sempre buildata, non sperimentale.
#   - job `worker`: CUDA/ROCm/SYCL non entrano MAI nel binario del launcher
#     (whisper.cpp/ggml non garantisce di poterli linkare tutti insieme in
#     modo affidabile — ROCm in particolare forza il compilatore dell'intero
#     progetto e rischia di rompere una build che include anche CUDA — e
#     nessuno di questi backend viene comunque testato su GPU reale qui,
#     i runner non ne hanno). Restano build separate come oggi, ma il
#     risultato non è più un'app intera: è `cli/srt-transcribe-cli` (la
#     stessa identica pipeline usata da Vesta e dal CLI, vedi
#     lib/srt-transcribe) buildato con --features cuda|rocm|sycl. Il
#     launcher, a runtime, rileva l'hardware e scarica solo il worker che
#     gli serve da questa stessa release (vedi apps/whisper-bench/src-tauri/
#     src/workers.rs) invece di portarseli dietro tutti.
#   - job `zip-sample`: pacchetta la clip di test già presente nel repo
#     (Test_Subs/fixtures/detour) come sample media scaricabile dall'app.
#
# CUDA e ROCm restano opt-in dal run manuale (toolchain pesanti, build
# lente); SYCL (Intel oneAPI) idem, è la più sperimentale delle tre.
on:
  push:
    branches: [main]
    paths:
      - "apps/whisper-bench/**"
      - "cli/srt-transcribe-cli/**"
      - "lib/srt-transcribe/**"
      - "Test_Subs/fixtures/detour/**"
      - ".github/workflows/whisper-bench.yml"
  workflow_dispatch:
    inputs:
      build_cuda:
        description: "Builda anche il worker CUDA (toolkit ~3GB, build lente)"
        type: boolean
        default: false
      build_rocm:
        description: "Builda anche il worker ROCm/hipBLAS (solo Linux, sperimentale)"
        type: boolean
        default: false
      build_sycl:
        description: "Builda anche il worker SYCL/oneAPI Intel (sperimentale)"
        type: boolean
        default: false

env:
  WHISPER_DONT_GENERATE_BINDINGS: "1"

permissions:
  contents: write

jobs:
  # ===========================================================
  # L'unico eseguibile per OS che gli utenti scaricano: CPU + Vulkan
  # sempre inclusi, GUI Tauri, auto-detect hardware a runtime.
  # ===========================================================
  launcher:
    name: launcher-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            bundles: appimage,deb
          - name: windows
            os: windows-latest
            bundles: nsis
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-whisper-bench-launcher-${{ matrix.name }}"

      - name: Setup Node.js (per tauri-cli)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            pkg-config \
            libssl-dev \
            libclang-dev

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      # Serve l'SDK LunarG completo (incluso glslc): i soli header/loader
      # non bastano a ggml-vulkan per compilare gli shader.
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe" -OutFile vulkan_sdk.exe
          Start-Process -Wait -FilePath .\vulkan_sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install"
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build launcher (cpu + vulkan)
        shell: bash
        working-directory: apps/whisper-bench/src-tauri
        run: npx --yes @tauri-apps/cli@^2 build --bundles ${{ matrix.bundles }} -- --features vulkan

      # I bundle escono con lo stesso nome ad ogni OS: rinomina col suffisso
      # prima di pubblicarli.
      - name: Rename bundles with OS suffix
        shell: bash
        run: |
          mkdir -p dist-out
          shopt -s nullglob
          for f in target/release/bundle/appimage/*.AppImage \
                   target/release/bundle/deb/*.deb \
                   target/release/bundle/nsis/*.exe; do
            base=$(basename "$f")
            ext="${base##*.}"
            stem="${base%.*}"
            cp "$f" "dist-out/${stem}-${{ matrix.name }}.${ext}"
          done
          ls -la dist-out

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: whisper-bench-launcher-${{ matrix.name }}
          path: dist-out/*
          if-no-files-found: error

  # ===========================================================
  # Worker headless per backend GPU pesanti: stessa pipeline di Vesta
  # (cli/srt-transcribe-cli), un binario per backend, scaricato dal
  # launcher solo se l'hardware corrispondente viene rilevato.
  # ===========================================================
  worker:
    name: worker-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cuda-linux
            os: ubuntu-22.04
            gpu: cuda
            input: build_cuda
          - name: cuda-windows
            os: windows-latest
            gpu: cuda
            input: build_cuda
          # ROCm su Windows non è supportato dal build system di whisper.cpp
          # (hipBLAS 5.7 non linka su Windows, vedi ggml-org/whisper.cpp#2202).
          - name: rocm-linux
            os: ubuntu-22.04
            gpu: rocm
            input: build_rocm
          - name: sycl-linux
            os: ubuntu-22.04
            gpu: sycl
            input: build_sycl
          - name: sycl-windows
            os: windows-latest
            gpu: sycl
            input: build_sycl
    steps:
      - name: Skip disabled GPU backends
        id: gate
        shell: bash
        run: |
          skip=false
          if [ "${{ inputs[matrix.input] }}" != "true" ]; then skip=true; fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.gate.outputs.skip != 'true'

      - name: Install Rust stable
        if: steps.gate.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.gate.outputs.skip != 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-whisper-bench-worker-${{ matrix.name }}"

      - name: Install Linux system dependencies
        if: steps.gate.outputs.skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev libclang-dev

      - name: Install CUDA toolkit
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          method: network
          use-github-cache: false

      - name: Install ROCm/hipBLAS (Linux)
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'rocm'
        run: |
          wget -qO- https://repo.radeon.com/rocm/rocm.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.2 jammy main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update
          sudo apt-get install -y rocm-hip-sdk hipblas-dev rocblas-dev
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"

      - name: Install Intel oneAPI DPC++ compiler (Linux)
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'sycl' && runner.os == 'Linux'
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-compiler-dpcpp-cpp
          echo "/opt/intel/oneapi/compiler/latest/bin" >> "$GITHUB_PATH"

      # Il più sperimentale dei tre: l'installer offline oneAPI per Windows
      # cambia versione/URL più spesso degli altri due. continue-on-error
      # a livello di job copre un fallimento qui.
      - name: Install Intel oneAPI DPC++ compiler (Windows)
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'sycl' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/intel-oneapi-base-toolkit-windows.exe" -OutFile oneapi.exe
          Start-Process -Wait -FilePath .\oneapi.exe -ArgumentList "-s --action install --components intel.oneapi.win.dpcpp-compiler --eula accept -p=NEED_VS2017_INTEGRATION=0"

      - name: Build worker binary
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: cargo build --release --features ${{ matrix.gpu }} -p srt-transcribe-cli

      - name: Package worker binary
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p dist-out
          os_slug="linux"
          src="target/release/srt-transcribe"
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            os_slug="windows"
            src="target/release/srt-transcribe.exe"
            ext=".exe"
          fi
          out="dist-out/srt-transcribe-${{ matrix.gpu }}-${os_slug}${ext}"
          cp "$src" "$out"
          (cd dist-out && sha256sum "$(basename "$out")" > "$(basename "$out").sha256")
          ls -la dist-out

      - name: Upload artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: whisper-bench-worker-${{ matrix.name }}
          path: dist-out/*
          if-no-files-found: error

  # ===========================================================
  # Sample media scaricabile dall'app ("Use bundled sample episode"):
  # riusa la clip già committata per la golden suite Detour invece di
  # introdurre media nuovo e non verificato.
  # ===========================================================
  zip-sample:
    name: Package sample media
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Zip sample episode + reference SRTs
        run: |
          mkdir -p dist-out
          zip -j dist-out/whisper-bench-sample.zip \
            Test_Subs/fixtures/detour/detour_clip_90s.mp4 \
            Test_Subs/fixtures/detour/detour_clip_90s_en.srt \
            Test_Subs/fixtures/detour/detour_clip_90s_it.srt
      - uses: actions/upload-artifact@v6
        with:
          name: whisper-bench-sample
          path: dist-out/*
          if-no-files-found: error

  # ===========================================================
  # Prerelease rolling "whisper-bench-latest": un solo URL pubblico,
  # scaricabile dai tester senza account GitHub (a differenza degli
  # artifact dei run). Ogni build sovrascrive gli asset omonimi. Il
  # launcher costruisce a runtime gli URL dei worker/sample da questa
  # stessa release (tag fisso), vedi src-tauri/src/workers.rs e sample.rs.
  # ===========================================================
  publish:
    name: Publish rolling prerelease
    needs: [launcher, worker, zip-sample]
    # always(): i worker GPU sono continue-on-error, ma gli artifact delle
    # varianti riuscite (e il launcher, e il sample) vanno pubblicati comunque.
    if: always() && needs.launcher.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Attach to whisper-bench-latest prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: whisper-bench-latest
          name: "whisper-bench (rolling build)"
          prerelease: true
          body: |
            Build automatiche della mini-app di benchmark Whisper (`apps/whisper-bench`).
            Scarica **un solo file per il tuo sistema operativo**, avvia, scegli un media
            (o premi "Use bundled sample episode" per usarne uno già pronto), premi
            **Run benchmark** e rimanda indietro il CSV finale.

            - `*-linux` / `*-windows`: unico eseguibile, CPU + Vulkan sempre inclusi
              (copre AMD/NVIDIA/Intel senza download aggiuntivi).
            - Se l'app rileva una GPU NVIDIA, AMD o Intel più specifica, scarica in
              automatico (una volta sola, con verifica sha256) il worker CUDA/ROCm/SYCL
              corrispondente da questa stessa release e lo usa in più oltre a Vulkan.

            Aggiornata ad ogni push che tocca l'app. Commit: ${{ github.sha }}
          files: dist/*
