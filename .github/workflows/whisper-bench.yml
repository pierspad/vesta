name: whisper-bench

# Build della mini-app di benchmark Whisper (apps/whisper-bench).
# Separato dalla CI normale per non allungarla: parte automaticamente solo
# quando cambia l'app (o questo workflow), oppure a mano da
# Actions -> whisper-bench -> Run workflow. CPU e Vulkan sono sempre inclusi
# (Vulkan copre AMD/NVIDIA/Intel con un solo binario); CUDA e ROCm sono
# opt-in dal run manuale perché richiedono toolchain pesanti e allungano
# molto la build.
on:
  push:
    branches: [main]
    paths:
      - "apps/whisper-bench/**"
      - "lib/srt-transcribe/**"
      - ".github/workflows/whisper-bench.yml"
  workflow_dispatch:
    inputs:
      build_cuda:
        description: "Builda anche le varianti CUDA (toolkit ~3GB, build lente)"
        type: boolean
        default: false
      build_rocm:
        description: "Builda anche la variante ROCm/hipBLAS (solo Linux, sperimentale)"
        type: boolean
        default: false

env:
  WHISPER_DONT_GENERATE_BINDINGS: "1"
  APP_DIR: apps/whisper-bench/src-tauri

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-cpu
            os: ubuntu-22.04
            features: ""
            bundles: appimage,deb
            experimental: false
            gpu: none
          - name: linux-vulkan
            os: ubuntu-22.04
            features: vulkan
            bundles: appimage,deb
            experimental: false
            gpu: vulkan
          - name: windows-cpu
            os: windows-latest
            features: ""
            bundles: nsis
            experimental: false
            gpu: none
          - name: windows-vulkan
            os: windows-latest
            features: vulkan
            bundles: nsis
            experimental: true
            gpu: vulkan
          - name: linux-cuda
            os: ubuntu-22.04
            features: cuda
            bundles: appimage,deb
            experimental: true
            gpu: cuda
          - name: windows-cuda
            os: windows-latest
            features: cuda
            bundles: nsis
            experimental: true
            gpu: cuda
          - name: linux-rocm
            os: ubuntu-22.04
            features: rocm
            bundles: appimage,deb
            experimental: true
            gpu: rocm
    steps:
      - name: Skip disabled GPU backends
        id: gate
        shell: bash
        run: |
          skip=false
          if [ "${{ matrix.gpu }}" = "cuda" ] && [ "${{ inputs.build_cuda }}" != "true" ]; then skip=true; fi
          if [ "${{ matrix.gpu }}" = "rocm" ] && [ "${{ inputs.build_rocm }}" != "true" ]; then skip=true; fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.gate.outputs.skip != 'true'

      - name: Install Rust stable
        if: steps.gate.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.gate.outputs.skip != 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-whisper-bench-${{ matrix.name }}"

      - name: Setup Node.js (per tauri-cli)
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Linux system dependencies
        if: steps.gate.outputs.skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            pkg-config \
            libssl-dev \
            libclang-dev

      - name: Install Vulkan SDK (Linux)
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'vulkan' && runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      # Serve l'SDK LunarG completo (incluso glslc): i soli header/loader
      # non bastano a ggml-vulkan per compilare gli shader.
      - name: Install Vulkan SDK (Windows)
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'vulkan' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe" -OutFile vulkan_sdk.exe
          Start-Process -Wait -FilePath .\vulkan_sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install"
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install CUDA toolkit
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          method: network
          use-github-cache: false

      - name: Install ROCm/hipBLAS (Linux)
        if: steps.gate.outputs.skip != 'true' && matrix.gpu == 'rocm'
        run: |
          wget -qO- https://repo.radeon.com/rocm/rocm.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.2 jammy main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update
          sudo apt-get install -y rocm-hip-sdk hipblas-dev rocblas-dev
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"

      - name: Build whisper-bench
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            npx --yes @tauri-apps/cli@^2 build --bundles ${{ matrix.bundles }} -- --features ${{ matrix.features }}
          else
            npx --yes @tauri-apps/cli@^2 build --bundles ${{ matrix.bundles }}
          fi

      # I bundle escono con lo stesso nome per ogni variante (es.
      # whisper-bench_0.1.0_amd64.AppImage sia per cpu che per vulkan):
      # rinomina col suffisso della variante prima di pubblicarli.
      - name: Rename bundles with variant suffix
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p dist-out
          shopt -s nullglob
          for f in target/release/bundle/appimage/*.AppImage \
                   target/release/bundle/deb/*.deb \
                   target/release/bundle/nsis/*.exe; do
            base=$(basename "$f")
            ext="${base##*.}"
            stem="${base%.*}"
            cp "$f" "dist-out/${stem}-${{ matrix.name }}.${ext}"
          done
          ls -la dist-out

      - name: Upload artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: whisper-bench-${{ matrix.name }}
          path: dist-out/*
          if-no-files-found: error

  # ===========================================================
  # Prerelease rolling "whisper-bench-latest": un solo URL pubblico,
  # scaricabile dai tester senza account GitHub (a differenza degli
  # artifact dei run). Ogni build sovrascrive gli asset omonimi.
  # ===========================================================
  publish:
    name: Publish rolling prerelease
    needs: build
    # always(): i job GPU "experimental" possono fallire (continue-on-error),
    # ma gli artifact delle varianti riuscite vanno pubblicati comunque.
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach to whisper-bench-latest prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: whisper-bench-latest
          name: "whisper-bench (rolling build)"
          prerelease: true
          body: |
            Build automatiche della mini-app di benchmark Whisper (`apps/whisper-bench`).
            Scarica il file per il tuo sistema, avvia, scegli un media, premi **Run benchmark**
            e rimanda indietro il CSV finale.

            - `*-linux-cpu` / `*-windows-cpu`: gira ovunque, solo CPU
            - `*-linux-vulkan` / `*-windows-vulkan`: aggiunge le varianti GPU (AMD/NVIDIA/Intel)

            Aggiornata ad ogni push che tocca l'app. Commit: ${{ github.sha }}
          files: dist/*
