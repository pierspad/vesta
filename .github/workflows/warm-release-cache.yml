name: Warm Release Cache

# WHY THIS WORKFLOW EXISTS
# ------------------------
# build.yml (the real release builder) only ever runs against a tag ref
# (push: tags: 'v*') or a workflow_dispatch that semantic-release points
# at that same tag. GitHub Actions caches (both sccache's own GHA backend
# and swatinem/rust-cache's target-dir cache) are scoped per git ref, and
# per GitHub's own docs a cache created for one tag is NEVER visible to a
# workflow run for a different tag:
#   "Workflow runs also cannot restore caches created for different tag
#    names. For example, a cache created for the tag release-a [...]
#    would not be accessible to a workflow run triggered for the tag
#    release-b."
# Since every release cuts a brand-new tag, build.yml has therefore
# always started from a stone-cold cache -- that's the 0% hit rate /
# thousands of misses you see in its sccache stats. It's not a
# misconfiguration of the cache keys; it's how GH scopes caches to tags.
#
# The one scope every ref CAN fall back to is the repository's default
# branch (main): "If there are still no hits in the current branch, the
# cache action retries the same steps on the default branch." This
# workflow populates exactly that fallback: on every push to main that
# touches compiled code, it runs the *same* compile step (same profile,
# same --features, same sccache shared-key) as build.yml, so that when
# semantic-release cuts the next tag, build.yml's tag-scoped run falls
# back to this warm main-scoped cache instead of recompiling the entire
# dependency graph (whisper.cpp/ggml, tauri, ...) from scratch. Only the
# small, frequently-changed vesta/srt-* crates still need a fresh
# compile at release time.
#
# Deliberately produces no artifacts and no GitHub Release: its only job
# is to leave a warm cache behind. Gated on `paths` so pure
# frontend-only commits (the majority of commits in this repo) don't pay
# full native-compile time for nothing.
#
# Caveat: bundling tools (tauri-cli) may bake in a handful of env-derived
# values that plain `cargo build` doesn't reproduce bit-for-bit, so a
# 100% hit rate on the next tag build isn't guaranteed -- but the bulk of
# the graph (every third-party dependency, unchanged between commits)
# should now hit.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "lib/**"
      - "cli/**"
      - "apps/srt-gui/src-tauri/**"
      - "vendor/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/warm-release-cache.yml"
  workflow_dispatch: {}

env:
  TAURI_APP_DIR: apps/srt-gui
  WHISPER_DONT_GENERATE_BINDINGS: "1"

concurrency:
  group: warm-release-cache
  cancel-in-progress: true

jobs:
  # Mirrors build-linux's compile step in build.yml (same profile, same
  # --features vulkan, same shared-key) so the cache it leaves on `main`
  # is byte-for-byte reusable by the tag-triggered release build.
  warm-linux:
    name: Warm cache (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache GHA credentials
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-sccache-linux"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            cmake \
            pkg-config \
            libssl-dev \
            libclang-dev

      - name: Install Vulkan SDK
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install frontend dependencies
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm ci

      - name: Generate platform icons
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npx tauri icon src-tauri/icons/icon.svg -o src-tauri/icons

      - name: Build frontend assets (richiesto da generate_context!)
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm run build

      - name: Compile release binary (cache warm-up only, no bundling)
        working-directory: ${{ env.TAURI_APP_DIR }}/src-tauri
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --features vulkan --locked

  # Mirrors build-windows's compile step. NB: unlike Linux, build.yml's
  # Windows job does NOT pass --features vulkan (see `tauri build` there)
  # -- keep this in sync if that ever changes.
  warm-windows:
    name: Warm cache (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure sccache GHA credentials
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          shared-key: "v1-sccache-windows"

      - name: Install system dependencies
        run: |
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # build-windows in build.yml runs two separate `cargo check` passes
      # before its real `cargo build` (to fail fast before spending time on
      # the frontend/bundling steps). `cargo check` and `cargo build` emit
      # different rustc invocations (metadata-only vs full codegen), so they
      # land under different sccache keys — warming only the final build
      # command left these two check passes with zero pre-warmed entries to
      # hit, which is why the Windows job's sccache hit rate was ~0% even
      # though writes were succeeding fine. Mirror both checks here too.
      - name: Preflight Cargo check (whisper-rs-sys)
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo check -p whisper-rs-sys

      - name: Install frontend dependencies
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm ci

      - name: Generate platform icons
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npx tauri icon src-tauri/icons/icon.svg -o src-tauri/icons

      - name: Build frontend assets (richiesto da generate_context!)
        working-directory: ${{ env.TAURI_APP_DIR }}
        run: npm run build

      - name: Preflight Cargo check
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo check --manifest-path apps/srt-gui/src-tauri/Cargo.toml --locked

      - name: Compile release binary (cache warm-up only, no bundling)
        working-directory: ${{ env.TAURI_APP_DIR }}/src-tauri
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --locked
